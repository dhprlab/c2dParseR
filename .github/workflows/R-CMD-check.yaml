# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,   r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,   r: 'release'}
          - {os: ubuntu-latest,   r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      # Run R CMD check but allow errors so we can examine them
      - name: R CMD check
        id: rcmdcheck
        uses: r-lib/actions/check-r-package@v2
        continue-on-error: true
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'

      # Override ONLY the silly oldrel-1 license warning
      - name: Ignore EUPL license warning on oldrel-1
        if: ${{ steps.rcmdcheck.outcome == 'failure' && matrix.config.r == 'oldrel-1' }}
        run: |
          echo "Inspecting log for EUPL license warning..."
          if grep -q "Non-standard license specification" check/*.Rcheck/00check.log; then
            echo "Ignoring harmless EUPL license warning on oldrel-1"
            exit 0
          else
            echo "This was a real failure on oldrel-1"
            exit 1
          fi

      # Final fail step: if check failed and was NOT ignorable, fail workflow
      - name: Fail on real errors
        if: ${{ steps.rcmdcheck.outcome == 'failure' && (matrix.config.r != 'oldrel-1') }}
        run: |
          echo "Failure on ${matrix.config.r} is real. Failing."
          exit 1
